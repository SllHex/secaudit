name: Scheduled Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      AUDIT_TARGET_URL: ${{ vars.AUDIT_TARGET_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Run SecAudit
        if: ${{ env.AUDIT_TARGET_URL != '' }}
        run: |
          secaudit scan "$AUDIT_TARGET_URL" --profile deep --json secaudit-report.json --ci

      - name: Upload audit artifact
        if: ${{ env.AUDIT_TARGET_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: secaudit-report
          path: secaudit-report.json
